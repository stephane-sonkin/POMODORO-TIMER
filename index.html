<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro Timer</title>
    <link rel="icon" type="image/x-icon" href="logo_pomododro.png">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">

      <!-- App title -->
      <h1>Pomodoro Timer</h1>

      <!-- Timer display -->
      <div class="timer-display" id="timer">25 : 00</div>
      
      <!-- Current mode (Work / Break) -->
      <div class="mode-label" id="mode-label">WORK</div>

      <!-- Controls -->
      <div class="controls">
        <button id="start-btn" onclick="startTimer()">Start</button>
        <button id="pause-btn" onclick="pauseTimer()" disabled >Pause</button>
        <button onclick="resetTimer()">Reset</button>
      </div>

      <!-- Completed sessions -->
      <div class="sessions">Sessions: <span id="sessions">0</span></div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
